name: "Drug Trafficking"
description: "Phân tích hội thoại có dấu hiệu mua bán, vận chuyển hoặc sử dụng ma túy."
keywords:
  - "đi bay"
  - "kẹo"
  - "hàng trắng"
  - "ship"
  - "đơn hàng"
focus_areas:
  - "Giải mã ám hiệu ma túy, đơn vị hàng và vai trò các đối tượng."
  - "Tìm giao dịch, số lượng, địa điểm, thời gian và phương thức vận chuyển."
  - "Đánh giá rủi ro và dấu hiệu che giấu."
dictionaries:
  kẹo: thuốc lắc (MDMA)
  cơm: hàng trắng / heroin
  gỗ: bánh heroin
  cái ly: đơn vị ma túy (khoảng 40 triệu đồng)
  nút áo: đơn vị ma túy nhỏ (khoảng 120k)
  giấy đỏ: đơn vị ma túy (100k)
  lavie / dưa: ma túy đá (Methamphetamine)
  pob: Ketamine
  muối tắm: ma túy tổng hợp (Mephedrone)
  nước vui: nước khoái (Meth + Ketamine dạng lỏng)
  tem giấy / bùa lưỡi: LSD (chất gây ảo giác)
  đồ: ma túy nói chung
  đi bay: sử dụng ma túy (bar/karaoke)
  xế: người vận chuyển (shipper)
